<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Timeline - Cadie</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tl-header { max-width: 640px; margin: 0 auto var(--space-6); }
    .tl-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin-bottom: var(--space-4); }
    .tl-breadcrumb a { color: var(--text-muted); transition: color 0.2s; }
    .tl-breadcrumb a:hover { color: var(--text); }
    .tl-breadcrumb svg { flex-shrink: 0; }
    .tl-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .tl-title { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: var(--space-2); }
    .tl-title .hash { color: var(--text-muted); font-weight: 300; font-size: 24px; }
    .tl-subtitle { color: var(--text-muted); font-size: 14px; }

    /* Filters */
    .tl-filters { display: flex; gap: 6px; max-width: 640px; margin: 0 auto var(--space-6); overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .tl-filters::-webkit-scrollbar { display: none; }
    .tl-pill { padding: 5px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; background: transparent; color: var(--text-muted); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; white-space: nowrap; font-family: var(--font-sans); }
    .tl-pill:hover { border-color: var(--text-muted); color: var(--text); }
    .tl-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Timeline Feed */
    .tl-feed { max-width: 640px; margin: 0 auto; position: relative; padding-left: 32px; }
    .tl-feed::before { content: ''; position: absolute; top: 0; bottom: 0; left: 11px; width: 1.5px; background: var(--border); }

    /* Date separator */
    .tl-date-sep { position: relative; margin: var(--space-6) 0 var(--space-4); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
    .tl-date-sep::before { content: ''; position: absolute; left: -21px; top: 50%; width: 7px; height: 7px; border-radius: 50%; background: var(--border); transform: translateY(-50%); }

    /* Entry cards */
    .tl-entry { position: relative; margin-bottom: var(--space-4); }
    .tl-dot { position: absolute; left: -27px; top: 14px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--surface); z-index: 2; }
    .tl-dot.blue { background: #60a5fa; }
    .tl-dot.green { background: #34d399; }
    .tl-dot.purple { background: #a78bfa; }
    .tl-dot.orange { background: #fb923c; }
    .tl-dot.gray { background: #71717a; }

    .tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; transition: border-color 0.2s; }
    .tl-card:hover { border-color: #3f3f46; }
    .tl-card-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .tl-card-type.experiment { color: #60a5fa; }
    .tl-card-type.decision { color: #a78bfa; }
    .tl-card-type.milestone { color: #34d399; }
    .tl-card-type.note { color: #71717a; }
    .tl-card-type.outcome { color: #fb923c; }
    .tl-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .tl-card-body { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
    .tl-card-meta { display: flex; align-items: center; gap: var(--space-2); margin-top: 10px; font-size: 12px; color: var(--text-muted); }
    .tl-card-meta .avatar { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }

    /* Milestone special style */
    .tl-entry.milestone .tl-card { border-left: 3px solid #34d399; background: linear-gradient(90deg, rgba(52,211,153,0.04) 0%, var(--surface) 50%); }
    .tl-entry.milestone .tl-dot { width: 13px; height: 13px; left: -28px; top: 13px; }

    /* Decision accent */
    .tl-entry.decision .tl-card { border-left: 3px solid #a78bfa; }

    /* Clickable experiment cards */
    .tl-entry.experiment .tl-card { cursor: pointer; }
    .tl-entry.experiment .tl-card:hover { border-color: #60a5fa; }

    /* Context notes toggle */
    .tl-notes-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); cursor: pointer; margin-top: 8px; padding: 3px 0; transition: color 0.2s; background: none; border: none; font-family: var(--font-sans); }
    .tl-notes-toggle:hover { color: var(--text); }
    .tl-notes-panel { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .tl-notes-panel.open { display: block; }
    .tl-context-note { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 13px; }
    .tl-context-note .note-author { font-weight: 600; font-size: 12px; }
    .tl-context-note .note-time { font-size: 11px; color: var(--text-muted); margin-left: 8px; }
    .tl-context-note .note-body { color: var(--text-muted); margin-top: 4px; line-height: 1.45; }
    .tl-add-context { display: flex; gap: 8px; margin-top: 8px; }
    .tl-add-context input { flex: 1; font-size: 13px; padding: 6px 10px; }
    .tl-add-context button { font-size: 12px; padding: 4px 12px; flex-shrink: 0; }

    /* Collapsed auto-events */
    .tl-collapsed-group { position: relative; margin-bottom: var(--space-4); }
    .tl-collapsed-group .tl-dot { background: #3f3f46; width: 9px; height: 9px; left: -26px; top: 8px; }
    .tl-collapsed-summary { font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 6px 0; transition: color 0.2s; }
    .tl-collapsed-summary:hover { color: var(--text); }
    .tl-collapsed-detail { display: none; margin-top: 4px; padding-left: 12px; border-left: 1px solid var(--border); }
    .tl-collapsed-detail.open { display: block; }
    .tl-collapsed-detail p { font-size: 12px; color: var(--text-muted); padding: 3px 0; }

    /* FAB for mobile */
    .tl-fab { display: none; position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; cursor: pointer; z-index: 30; box-shadow: 0 4px 16px rgba(0,0,0,0.5); align-items: center; justify-content: center; transition: transform 0.2s; }
    .tl-fab:hover { transform: scale(1.08); }

    @media (max-width: 768px) {
      .tl-header .btn { display: none; }
      .tl-fab { display: flex; }
      .tl-feed { padding-left: 28px; }
      .tl-title { font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="app-sidebar">
    <div class="brand-header">
      <div class="brand" style="margin-bottom: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Cadie</span>
      </div>
      <button class="btn btn-ghost" id="toggle-sidebar-btn" style="padding: 4px; height: 32px; width: 32px; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>
    <nav class="flex-col gap-2" style="width: 100%;">
      <a href="index.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Experiments</span></a>
      <a href="collections.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span>Collections</span></a>
      <a href="search.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Search</span></a>
      <a href="activity.html" class="nav-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Activity</span></a>
      <a href="timeline.html" class="nav-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Timeline</span></a>
      <div class="nav-dropdown">
        <a href="#" class="nav-link " id="channels-dropdown-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          <span>Channels</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: auto; transition: transform 0.2s;"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="dropdown-content" id="channels-dropdown-content" style="display: none; flex-direction: column; padding-left: 28px; gap: 2px; margin-top: 4px;">
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Core Product</div>
          <a href="timeline.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Checkout</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Onboarding</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Core UI</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Innovation</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># AI Features</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Growth</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Growth</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Retention</span></a>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <div class="tl-header">
      <div class="tl-breadcrumb">
        <a href="collections-hybrid.html">Collections</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <a href="collections-hybrid.html">Checkout</a>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <span style="color: var(--text);">Timeline</span>
      </div>
      <div class="tl-title-row">
        <h1 class="tl-title"><span class="hash">#</span> Checkout — Timeline</h1>
        <button class="btn btn-primary btn-sm" id="add-entry-btn" style="padding: 6px 16px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Entry
        </button>
      </div>
      <p class="tl-subtitle">How this work evolved over time.</p>
    </div>

    <!-- Filter pills -->
    <div class="tl-filters" id="tl-filters">
      <button class="tl-pill active" data-filter="all">All</button>
      <button class="tl-pill" data-filter="experiment">Experiments</button>
      <button class="tl-pill" data-filter="decision">Decisions</button>
      <button class="tl-pill" data-filter="milestone">Milestones</button>
      <button class="tl-pill" data-filter="note">Notes</button>
      <button class="tl-pill" data-filter="outcome">Outcomes</button>
    </div>

    <!-- Timeline Feed -->
    <div class="tl-feed" id="tl-feed"></div>

    <!-- Mobile FAB -->
    <button class="tl-fab" id="add-entry-fab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </main>

  <!-- Add Entry Modal -->
  <div class="modal-overlay" id="entry-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Add Timeline Entry</h2>
        <button class="btn btn-ghost" id="close-entry-modal" style="padding: 4px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="entry-form">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="input" id="entry-type">
            <option value="decision">Decision</option>
            <option value="milestone">Milestone</option>
            <option value="note">Note</option>
            <option value="outcome">Outcome</option>
          </select>
        </div>
        <div class="form-group" id="entry-title-group">
          <label class="form-label">Title</label>
          <input type="text" class="input" id="entry-title" placeholder="e.g. Kill the guest checkout default" required>
        </div>
        <div class="form-group">
          <label class="form-label" id="entry-body-label">Rationale / Details</label>
          <textarea class="input" id="entry-body" placeholder="What happened and why..." required style="min-height: 100px;"></textarea>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-xs text-muted font-mono">Esc to cancel</span>
          <button type="submit" class="btn btn-primary">Post Entry</button>
        </div>
      </form>
    </div>
  </div>

  <script src="timeline.js"></script>
  <script src="app.js"></script>
</body>
</html>
