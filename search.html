<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - Cadie</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .huge-search {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      font-size: 32px;
      padding: var(--space-4) 0;
      color: var(--text);
      font-family: var(--font-sans);
      margin-bottom: var(--space-8);
      outline: none;
      transition: border-color 0.2s;
    }
    .huge-search:focus {
      border-bottom-color: var(--primary);
    }
    .huge-search::placeholder {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  
    <!-- Sidebar -->
  <aside class="sidebar" id="app-sidebar">
    <div class="brand-header">
      <div class="brand" style="margin-bottom: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Cadie</span>
      </div>
      <button class="btn btn-ghost" id="toggle-sidebar-btn" style="padding: 4px; height: 32px; width: 32px; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>
    
    <nav class="flex-col gap-2" style="width: 100%;">
      <a href="index.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Experiments</span>
      </a>
      <a href="collections.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Collections</span>
      </a>
      <a href="search.html" class="nav-link active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </a>
      <a href="activity.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Activity</span>
      </a>
      <a href="timeline.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Timeline</span>
      </a>
      
      <!-- Channels Dropdown -->
      <div class="nav-dropdown">
        <a href="#" class="nav-link " id="channels-dropdown-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          <span>Channels</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: auto; transition: transform 0.2s;"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="dropdown-content" id="channels-dropdown-content" style="display: none; flex-direction: column; padding-left: 28px; gap: 2px; margin-top: 4px;">
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Core Product</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Checkout</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Onboarding</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Core UI</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Innovation</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># AI Features</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Growth</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Growth</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Retention</span></a>
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    
    <div style="max-width: 800px; margin: 0 auto; margin-top: 40px;">
      <input type="text" id="huge-search-input" class="huge-search" placeholder="Search experiments, context, or learnings..." autofocus>
      
      <div id="search-status" class="text-muted text-sm" style="margin-bottom: var(--space-4);">
        Type to search across all your team's experiments.
      </div>

      <div class="grid" id="search-results-grid" style="grid-template-columns: 1fr;">
        <!-- Results will be injected here -->
      </div>
    </div>
    
  </main>

  <script>
    const experimentsData = [
      {
        title: "One-click checkout flow",
        desc: "Exploration of a simplified checkout bypassing the cart review step.",
        collection: "Checkout",
        status: "Shipped",
        statusClass: "badge-success",
        author: "Alex D.",
        date: "2d ago",
        gradient: "linear-gradient(135deg, #27272a 0%, #18181b 100%)",
        icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
        color: "#a1a1aa"
      },
      {
        title: "Magic Copywriter Prototype",
        desc: "Testing LLM generation for item descriptions directly in the composer.",
        collection: "AI Features",
        status: "Testing",
        statusClass: "badge-warning",
        author: "Sarah K.",
        date: "5d ago",
        gradient: "linear-gradient(135deg, #78350f 0%, #451a03 100%)",
        icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
        color: "#f59e0b"
      },
      {
        title: "New Typography Scale",
        desc: "Testing Geist as the primary font for dashboard interfaces.",
        collection: "Design System",
        status: "Parked",
        statusClass: "",
        author: "Alex D.",
        date: "1w ago",
        gradient: "linear-gradient(135deg, #312e81 0%, #1e1b4b 100%)",
        icon: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`,
        color: "#818cf8"
      },
      {
        title: "Dark Mode Theme Toggle",
        desc: "Exploration of a simple toggle in the sidebar for switching between light and dark themes.",
        collection: "Design System",
        status: "Exploration",
        statusClass: "",
        author: "Sarah K.",
        date: "3w ago",
        gradient: "linear-gradient(135deg, #064e3b 0%, #022c22 100%)",
        icon: `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`,
        color: "#34d399"
      }
    ];

    const searchInput = document.getElementById('huge-search-input');
    const resultsGrid = document.getElementById('search-results-grid');
    const searchStatus = document.getElementById('search-status');

    function renderResults(query) {
      if (!query.trim()) {
        resultsGrid.innerHTML = '';
        searchStatus.textContent = "Type to search across all your team's experiments.";
        return;
      }

      const lowerQuery = query.toLowerCase();
      const filtered = experimentsData.filter(exp => 
        exp.title.toLowerCase().includes(lowerQuery) || 
        exp.desc.toLowerCase().includes(lowerQuery) ||
        exp.collection.toLowerCase().includes(lowerQuery)
      );

      resultsGrid.innerHTML = '';

      if (filtered.length === 0) {
        searchStatus.textContent = `No results found for "${query}"`;
        return;
      }

      searchStatus.textContent = `Found ${filtered.length} result${filtered.length === 1 ? '' : 's'} for "${query}"`;

      filtered.forEach(exp => {
        const statusBadge = exp.statusClass 
          ? `<span class="badge ${exp.statusClass}">${exp.status}</span>`
          : `<span class="badge">${exp.status}</span>`;

        const card = document.createElement('div');
        card.className = 'card flex';
        card.style.cursor = 'pointer';
        card.onclick = () => window.location.href = 'experiment.html';
        
        card.innerHTML = `
          <div style="width: 120px; flex-shrink: 0; background: ${exp.gradient}; display:flex; align-items:center; justify-content:center; color:${exp.color}; border-right: 1px solid var(--border);">
            ${exp.icon}
          </div>
          <div class="card-content w-full">
            <div class="flex items-center justify-between" style="margin-bottom: 8px;">
              <span class="badge">${exp.collection}</span>
              ${statusBadge}
            </div>
            <h3 class="card-title">${exp.title}</h3>
            <p class="card-desc">${exp.desc}</p>
            <div class="flex items-center gap-2" style="margin-top: 12px;">
              <div style="width: 16px; height: 16px; border-radius: 50%; background: var(--secondary);"></div>
              <span class="text-xs text-muted">${exp.author} • ${exp.date}</span>
            </div>
          </div>
        `;
        resultsGrid.appendChild(card);
      });
    }

    searchInput.addEventListener('input', (e) => {
      renderResults(e.target.value);
    });

    // Handle small search bars globally if present
    document.querySelectorAll('.search-bar input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          window.location.href = `search.html?q=${encodeURIComponent(input.value.trim())}`;
        }
      });
    });

    // Check URL params for initial search
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) {
      searchInput.value = initialQuery;
      renderResults(initialQuery);
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
