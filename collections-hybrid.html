<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections (Hybrid) - Cadie</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Override for double-sidebar layout */
    body {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg);
    }
    
    /* Inner Sidebar (Collections List) */
    .inner-sidebar {
      width: 240px;
      background-color: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 40;
    }
    .inner-sidebar-header {
      padding: 0 var(--space-4);
      border-bottom: 1px solid var(--border);
      height: 72px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .inner-sidebar-content {
      padding: var(--space-3);
      overflow-y: auto;
      flex: 1;
    }
    .collection-group-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: 600;
      margin: var(--space-4) var(--space-2) var(--space-2) var(--space-2);
    }
    .collection-link {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
      transition: background 0.2s, color 0.2s;
      cursor: pointer;
    }
    .collection-link:hover {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }
    .collection-link.active {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }
    .hash {
      color: var(--text-muted);
      margin-right: 12px;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.7;
    }
    
    .main-content {
      flex: 1;
      min-width: 0;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0; /* Reset padding from style.css */
    }
    
    .header-hybrid {
      height: 72px;
      padding: 0 var(--space-6);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background-color: var(--surface);
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }
    
        /* Mobile responsive for hybrid */
    @media (max-width: 768px) {
      .inner-sidebar {
        width: calc(100vw - 72px);
        height: auto;
        order: 1;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .inner-sidebar-header { display: none; }
      .inner-sidebar-content {
        display: flex;
        flex-direction: row;
        padding: var(--space-3) var(--space-4);
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .inner-sidebar-content::-webkit-scrollbar { display: none; }
      .collection-group-title { display: none !important; }
      .collection-link {
        margin-bottom: 0;
        margin-right: var(--space-2);
        padding: 6px 14px;
        background-color: var(--bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        white-space: nowrap;
      }
      .collection-link.active {
        background-color: var(--text);
        color: var(--bg);
        border-color: var(--text);
      }
      .collection-link.active .hash { color: var(--bg) !important; opacity: 0.5; }
      .collection-link:last-child { margin-right: 0; }
      
      .main-content { order: 2; width: calc(100vw - 72px); }
      .header-hybrid { flex-direction: column; align-items: flex-start; height: auto; padding: var(--space-4); gap: var(--space-4); }
      .header-hybrid .flex.gap-2 { width: 100%; }
      .header-hybrid .btn { flex: 1; }
      .scroll-area { padding: var(--space-4); }
    }
  </style>
</head>
<body>
  
    <!-- Sidebar -->
  <aside class="sidebar" id="app-sidebar">
    <div class="brand-header">
      <div class="brand" style="margin-bottom: 0;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span>Cadie</span>
      </div>
      <button class="btn btn-ghost" id="toggle-sidebar-btn" style="padding: 4px; height: 32px; width: 32px; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
    </div>
    
    <nav class="flex-col gap-2" style="width: 100%;">
      <a href="index.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Experiments</span>
      </a>
      <a href="collections.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Collections</span>
      </a>
      <a href="search.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Search</span>
      </a>
      <a href="activity.html" class="nav-link ">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Activity</span>
      </a>
      
      <!-- Channels Dropdown -->
      <div class="nav-dropdown">
        <a href="#" class="nav-link active" id="channels-dropdown-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          <span>Channels</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: auto; transition: transform 0.2s;"><polyline points="6 9 12 15 18 9"/></svg>
        </a>
        <div class="dropdown-content" id="channels-dropdown-content" style="display: none; flex-direction: column; padding-left: 28px; gap: 2px; margin-top: 4px;">
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Core Product</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Checkout</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Onboarding</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Core UI</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Innovation</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># AI Features</span></a>
          <div class="text-xs text-muted" style="margin-top: 8px; margin-bottom: 4px; text-transform: uppercase;">Growth</div>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Growth</span></a>
          <a href="collections-hybrid.html" class="nav-link" style="font-size: 13px; padding: 4px 8px;"><span># Retention</span></a>
        </div>
      </div>
    </nav>
  </aside>

  
  <!-- Main Content Area -->
  <main class="main-content">
    <header class="header-hybrid">
      <div class="flex items-center gap-2">
        <span class="text-muted" style="font-size: 24px; font-weight: 300;">#</span>
        <h1 id="current-collection-name" style="font-size: 20px; font-weight: 600; margin: 0;">Checkout</h1>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-outline btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="btn btn-primary btn-sm">New Experiment</button>
      </div>
    </header>
    
    <div class="scroll-area">
      <p id="current-collection-desc" class="text-muted mb-6" style="margin-bottom: var(--space-6); max-width: 600px;">
        Experiments related to the cart and checkout flow.
      </p>
      
      <div class="grid" id="hybrid-experiments-grid">
        <!-- Injected by JS -->
      </div>
    </div>
  </main>

  <script>
    const collections = [
      { id: 'checkout', group: 'Core Product', name: 'Checkout', desc: 'Experiments related to the cart and checkout flow. Minimizing friction and reducing cart abandonment.' },
      { id: 'onboarding', group: 'Core Product', name: 'Onboarding', desc: 'First-time user experience, sign-up flows, and tutorials.' },
      { id: 'core-ui', group: 'Core Product', name: 'Core UI', desc: 'Design system, navigation components, and global layout changes.' },
      { id: 'ai-features', group: 'Innovation', name: 'AI Features', desc: 'Integrations with generative models, magic copywriters, and smart recommendations.' },
      { id: 'growth', group: 'Growth & Marketing', name: 'Growth', desc: 'Referral loops, viral mechanics, and paid acquisition landing pages.' },
      { id: 'retention', group: 'Growth & Marketing', name: 'Retention', desc: 'Email campaigns, push notifications, and win-back mechanics.' }
    ];

    const mockExperiments = [
      { title: 'One-click checkout flow', collection: 'checkout', status: 'Shipped', color: '#34d399', bg: 'rgba(52,211,153,0.1)', date: 'Oct 28' },
      { title: 'Guest checkout default', collection: 'checkout', status: 'Testing', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', date: 'Nov 02' },
      { title: 'Remove coupon field', collection: 'checkout', status: 'Rejected', color: '#ef4444', bg: 'rgba(239,68,68,0.1)', date: 'Sep 15' },
      
      { title: 'Magic Copywriter Prototype', collection: 'ai-features', status: 'Parked', color: '#9ca3af', bg: 'rgba(156,163,175,0.1)', date: 'Aug 10' },
      { title: 'AI Image Gen Onboarding', collection: 'ai-features', status: 'Testing', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', date: 'Nov 01' },
      
      { title: 'Skip tutorial button', collection: 'onboarding', status: 'Shipped', color: '#34d399', bg: 'rgba(52,211,153,0.1)', date: 'Jul 22' },
      { title: 'Interactive walkthrough', collection: 'onboarding', status: 'Rejected', color: '#ef4444', bg: 'rgba(239,68,68,0.1)', date: 'Jun 14' },
      
      { title: 'Invite 3 friends modal', collection: 'growth', status: 'Testing', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', date: 'Nov 05' },
      { title: 'Gamified referral rewards', collection: 'growth', status: 'Evolved', color: '#60a5fa', bg: 'rgba(96,165,250,0.1)', date: 'Oct 01' },
      
      { title: 'Dark mode toggle', collection: 'core-ui', status: 'Shipped', color: '#34d399', bg: 'rgba(52,211,153,0.1)', date: 'Sep 20' },
      { title: 'Sidebar re-org', collection: 'core-ui', status: 'Testing', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)', date: 'Nov 10' },
      
      { title: 'Weekly recap email', collection: 'retention', status: 'Evolved', color: '#60a5fa', bg: 'rgba(96,165,250,0.1)', date: 'Oct 15' }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    let currentActiveId = urlParams.get('c') || 'all';

    const renderMainContent = () => {
      const grid = document.getElementById('hybrid-experiments-grid');
      grid.innerHTML = '';

      let experimentsToRender = [];

      if (currentActiveId === 'all') {
        document.getElementById('current-collection-name').textContent = 'All Experiments';
        document.getElementById('current-collection-desc').textContent = 'A complete view of every experiment stored across all collections in Cadie.';
        experimentsToRender = mockExperiments;
      } else {
        const activeCollection = collections.find(c => c.id === currentActiveId);
        if (activeCollection) {
          document.getElementById('current-collection-name').textContent = activeCollection.name;
          document.getElementById('current-collection-desc').textContent = activeCollection.desc;
          experimentsToRender = mockExperiments.filter(e => e.collection === currentActiveId);
        } else {
          document.getElementById('current-collection-name').textContent = 'Unknown Collection';
          document.getElementById('current-collection-desc').textContent = '';
        }
      }

      if (experimentsToRender.length === 0) {
        grid.innerHTML = `<p class="text-muted" style="grid-column: 1/-1;">No experiments found.</p>`;
        return;
      }

      experimentsToRender.forEach(exp => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.location.href = 'experiment.html';
        
        let badgeClass = '';
        if (exp.status === 'Shipped') badgeClass = 'badge-success';
        if (exp.status === 'Testing') badgeClass = 'badge-warning';
        if (exp.status === 'Rejected') badgeClass = 'badge-danger';

        card.innerHTML = `
          <div class="card-image" style="background: linear-gradient(135deg, ${exp.bg} 0%, rgba(0,0,0,0) 100%); display:flex; align-items:center; justify-content:center;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${exp.color}" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          </div>
          <div class="card-content">
            <div class="flex justify-between items-center" style="margin-bottom: var(--space-2);">
              <span class="badge ${badgeClass}" style="font-size: 10px;">${exp.status}</span>
              <span class="text-xs text-muted">${exp.date}</span>
            </div>
            <h3 class="card-title">${exp.title}</h3>
            <p class="card-desc">Exploration of ${exp.title.toLowerCase()} to improve user experience.</p>
          </div>
        `;
        grid.appendChild(card);
      });
    };

    renderMainContent();
  </script>
  <script src="app.js"></script>
</body>
</html>
